<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIFÊNIX | ALTO MONTANO CORE</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #ffeb3b; --text: #ffffff; --border: #262626; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header Estilo C6 */
        header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .logo { font-size: 14px; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        .status { font-size: 10px; opacity: 0.6; text-transform: uppercase; }

        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 15px; border-radius: 12px; font-size: 15px; line-height: 1.4; }
        .ai { background: var(--card); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .user { background: #fff; color: #000; font-weight: 600; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Botões de Ação Rápida (Estilo C6) */
        .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .chip { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .chip:hover { background: var(--accent); color: #000; }

        footer { padding: 20px; background: #000; border-top: 1px solid var(--border); }
        .input-box { background: var(--card); border-radius: 8px; padding: 5px 15px; display: flex; align-items: center; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 16px; }
        .send { color: var(--accent); font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; padding: 10px; }

        #typing { font-size: 11px; color: var(--accent); margin: 0 25px 10px; font-weight: 700; display: none; text-transform: uppercase; }
        b { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">BIFÊNIX<span>.</span></div>
    <div class="status">Alto Montano Intelligence</div>
</header>

<div id="chat">
    <div class="msg ai">
        Olá. Sou a inteligência central do <b>Instituto Alto Montano</b>. 
        Como posso agilizar sua solicitação agora?
        <div class="chips">
            <button class="chip" onclick="ask('Quero agendar uma visita')">AGENDAR VISITA</button>
            <button class="chip" onclick="ask('Me fale sobre as trilhas')">TRILHAS</button>
            <button class="chip" onclick="ask('Informações sobre a fauna')">AVES DA RPPN</button>
            <button class="chip" onclick="ask('Quem é você?')">CONHECER BIFÊNIX</button>
        </div>
    </div>
</div>

<div id="typing">Processando...</div>

<footer>
    <div class="input-box">
        <input type="text" id="in" placeholder="Escreva sua dúvida..." onkeypress="if(event.key==='Enter') ask()">
        <div class="send" onclick="ask()">Enviar</div>
    </div>
</footer>

<script>
    const _K = "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";

    async function ask(q = null) {
        const i = document.getElementById('in');
        const p = q || i.value.trim();
        if(!p) return;

        add('user', p);
        i.value = '';
        document.getElementById('typing').style.display = 'block';

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${_K}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `Aja como a IA do C6 Bank aplicada ao Instituto Alto Montano.
                        IDENTIDADE: Bifênix. Sofisticada, direta, eficiente.
                        DADOS DOS ARQUIVOS: 
                        - Trilhas: Mata dos Gnomos (1.3km/Branca), Pinhão Assado (3.1km/Azul), Rampa Voo Livre (16km/Laranja/2140m altitude).
                        - Aves: 189 espécies, ícone Sanhaçu-frade (Stephanophorus diadematus).
                        - Local: Itamonte, MG.
                        REGRAS: 
                        - Respostas curtas e modulares. 
                        - NUNCA repita a mesma saudação. 
                        - Foque no fechamento de hospedagem e agendamento (Passo 4: Nome, Data, Grupo).
                        - Se perguntarem sobre você: "Sou o Core de atendimento do Instituto, criada para otimizar sua experiência e a gestão da reserva."` },
                        { role: "user", content: p }
                    ],
                    temperature: 0.85
                })
            });
            const d = await r.json();
            document.getElementById('typing').style.display = 'none';
            add('ai', d.choices[0].message.content);
        } catch (e) {
            document.getElementById('typing').style.display = 'none';
            add('ai', "Erro de processamento. Tente novamente.");
        }
    }

    function add(s, t) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerHTML = t.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }
</script>
</body>
</html>
